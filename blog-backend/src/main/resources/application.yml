spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway makes the schema
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

# ? 256?bit (32?char+) secret used for both signing & parsing JWTs
jwt:
  secret: my_super_secret_key_for_jwt_1234567890
