spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/blog}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway makes the schema
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:nandha762003@gmail.com}
    password: ${MAIL_PASSWORD:lsnw opqa lend oipf}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# 256-bit (32-char+) secret used for signing & parsing JWTs.
jwt:
  secret: ${JWT_SECRET:my_super_secret_key_for_jwt_1234567890}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# Allowed CORS origins (comma-separated)
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  media:
    upload-dir: ${MEDIA_UPLOAD_DIR:uploads}
    base-url: ${MEDIA_BASE_URL:http://localhost:8080/media}
